user root;
worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Additional MIME types ──────────────────────────────────────────────────
    types {
        image/webp   webp;
        image/avif   avif;
        font/woff2   woff2;
        font/woff    woff;
    }

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        text/x-component
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        application/ld+json
        application/manifest+json
        image/svg+xml
        font/truetype
        font/opentype
        font/woff
        font/woff2;

    server {
        listen 80;
        root   /usr/share/nginx/html;
        index  index.html;

        # ── Security headers ────────────────────────────────────────────────
        add_header X-Frame-Options        "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"      always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # ── Static asset caching (1 year, immutable) ───────────────────────
        location ~* \.(js|css|woff|woff2|ttf|otf|eot)$ {
            expires    1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Vary "Accept-Encoding";
            access_log off;
        }

        # ── Image caching (1 year, immutable) ──────────────────────────────
        location ~* \.(webp|avif|png|jpg|jpeg|gif|ico|svg)$ {
            expires    1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Vary "Accept";
            access_log off;
        }

        # ── HTML caching (1 hour, must-revalidate) ──────────────────────────
        location ~* \.html$ {
            expires    1h;
            add_header Cache-Control "public, max-age=3600, must-revalidate";
        }

        # ── XML / JSON / manifest ───────────────────────────────────────────
        location ~* \.(xml|json|webmanifest)$ {
            expires    1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # ── Main routing ────────────────────────────────────────────────────
        location / {
            try_files $uri $uri/ $uri.html /index.html;
        }

        # ── Block hidden files ──────────────────────────────────────────────
        location ~ /\. {
            deny all;
        }
    }
}
