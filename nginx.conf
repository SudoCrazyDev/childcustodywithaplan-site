user root;
worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2
        application/font-woff
        application/font-woff2;

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # ── HTML pages: 1-day cache (revalidate) ─────────────────────────────
        # max-age=86400 (24 h) with must-revalidate so stale content is never
        # served silently; the short TTL keeps deploys propagating quickly.
        location ~* \.html$ {
            add_header Cache-Control "public, max-age=86400, must-revalidate";
            add_header X-Content-Type-Options "nosniff";
            try_files $uri $uri/ /index.html;
        }

        # ── Immutable versioned assets: JS, CSS, fonts ───────────────────────
        # Astro build appends a content hash to every asset filename, so these
        # files are safe to cache forever.  The `immutable` directive tells
        # browsers they never need to revalidate.
        location ~* \.(js|css|woff|woff2|ttf|otf|eot)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Content-Type-Options "nosniff";
            access_log off;
        }

        # ── Images: long-lived but revalidatable ─────────────────────────────
        # Images do not always carry content hashes in their filenames (e.g.
        # /images/hero-landing.webp), so we set a 1-year TTL without `immutable`
        # to allow conditional revalidation (ETag / Last-Modified) when a file
        # is updated in place.
        location ~* \.(webp|jpg|jpeg|png|gif|svg|ico|avif)$ {
            add_header Cache-Control "public, max-age=31536000";
            add_header X-Content-Type-Options "nosniff";
            access_log off;
        }

        # ── Fonts served from /fonts/ with immutable flag ────────────────────
        # Self-hosted font files that use content-addressed filenames.
        location ~* ^/fonts/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Access-Control-Allow-Origin "*";
            access_log off;
        }

        # ── robots.txt & sitemap.xml: short cache to allow quick updates ─────
        location ~* \.(xml|txt)$ {
            add_header Cache-Control "public, max-age=3600";
        }

        # ── Default SPA fallback ─────────────────────────────────────────────
        location / {
            add_header Cache-Control "public, max-age=86400, must-revalidate";
            try_files $uri $uri/ /index.html;
        }

        # ── Security headers ─────────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
