user  root;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;

    # ── Gzip Compression ────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_min_length   256;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml
        application/x-font-ttf
        font/opentype
        application/vnd.ms-fontobject;

    server {
        listen 80;
        root   /usr/share/nginx/html;
        index  index.html;

        # ── Static asset caching (JS, CSS, images, fonts) ───────────────
        # These files are content-hashed by Astro's build, so they can be
        # cached indefinitely (immutable) — browsers will get new assets
        # automatically when the hash changes.
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Vary "Accept-Encoding";
            access_log off;
        }

        # ── HTML caching (short TTL so content updates propagate quickly) ─
        location ~* \.html$ {
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
            add_header Vary "Accept-Encoding";
        }

        # ── Main try_files rule (SPA / Astro static output) ─────────────
        location / {
            try_files $uri $uri/ $uri.html /index.html;
        }

        # ── Security headers ─────────────────────────────────────────────
        add_header X-Frame-Options        "SAMEORIGIN"             always;
        add_header X-Content-Type-Options "nosniff"                always;
        add_header X-XSS-Protection       "1; mode=block"          always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    }
}
